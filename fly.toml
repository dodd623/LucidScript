app = "lucidscript"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

  [http_service.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "180s"
    interval = "30s"
    timeout = "10s"
