app = "lucidscript"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]

  [http_service.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    timeout = "10s"

[processes]
  app = "uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1 --timeout-keep-alive 120"